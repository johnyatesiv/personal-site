<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1200"
    height="300"
    viewBox="0 0 1200 300"
    background-color="#111111"
    style="filter: url(#metal-filter);">

    <!-- 1. DEFINITIONS (FILTERS for the 'Distressed' Look) -->
    <defs>
        <!-- A subtle random noise filter to simulate wear and tear -->
        <filter id="metal-filter">
            <feTurbulence id="noise" type="fractalNoise" baseFrequency="0.01 0.05" numOctaves="3" seed="42" result="turb" />
            <feDisplacementMap in="SourceGraphic" in2="turb" scale="3" xChannelSelector="R" yChannelSelector="R" />
        </filter>
    </defs>

    <!-- 2. THE TEXT ELEMENT -->
    <text
        x="600.0"
        y="150.0"
        font-family="Impact, 'Blackletter', fantasy, sans-serif"
        font-size="100"
        fill="none"
        stroke="#FF0000"
        stroke-width="6"
        text-anchor="middle"
        dominant-baseline="central"
    >
        JOHN YATES
    </text>

</svg>